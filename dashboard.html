<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>控制台 - 生产管理中心</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { 
            margin: 0; display: flex; height: 100vh; 
            background: #f0f2f5; color: #333;
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px; background: #1a1a1a; color: white;
            padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar h2 { font-size: 18px; margin-bottom: 30px; color: #007AFF; }
        .menu-item { 
            padding: 12px; margin-bottom: 8px; border-radius: 8px; 
            cursor: pointer; transition: 0.3s; color: #ccc;
        }
        .menu-item:hover, .menu-item.active { background: #333; color: white; }

        /* 主内容区 */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; 
        }

        /* 数据卡片布局 */
        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .stat-card h4 { margin: 0; color: #888; font-size: 14px; }
        .stat-card .value { font-size: 24px; font-weight: bold; margin: 10px 0; color: #007AFF; }

        /* 模拟生产列表表格 */
        .data-table {
            background: white; width: 100%; border-collapse: collapse;
            border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .data-table th { background: #fafafa; color: #666; }

        .status-tag { 
            padding: 4px 8px; border-radius: 4px; font-size: 12px; 
            background: #e1f5fe; color: #01579b; 
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>生产管理中心</h2>
        <div class="menu-item active">📊 运行概览</div>
        <div class="menu-item">⚙️ 设备监控</div>
        <div class="menu-item">📋 生产计划</div>
        <div class="menu-item">👤 用户管理</div>
        <div style="margin-top: auto;" class="menu-item" onclick="location.href='index.html'">🚪 退出登录</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>运行概览</h1>
            <div id="user-info">欢迎您，管理员</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>当日产出</h4>
                <div class="value">1,284 件</div>
                <div style="color: #4CD964; font-size: 12px;">↑ 12.5% 较昨日</div>
            </div>
            <div class="stat-card">
                <h4>设备稼动率</h4>
                <div class="value">98.2%</div>
                <div style="color: #4CD964; font-size: 12px;">运行正常</div>
            </div>
            <div class="stat-card">
                <h4>待处理预警</h4>
                <div class="value" style="color: #FF3B30;">3 条</div>
                <div style="color: #FF3B30; font-size: 12px;">需立即查看</div>
            </div>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>订单编号</th>
                    <th>生产线</th>
                    <th>预计交付</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#PO-2026001</td>
                    <td>A-01 自动化线</td>
                    <td>2026-03-25</td>
                    <td><span class="status-tag">生产中</span></td>
                </tr>
                <tr>
                    <td>#PO-2026002</td>
                    <td>B-04 组装线</td>
                    <td>2026-03-26</td>
                    <td><span class="status-tag">待启动</span></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
