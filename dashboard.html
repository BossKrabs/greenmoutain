<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>控制台 - 生产管理中心</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

    <div class="sidebar">
        <h2>生产管理中心</h2>
        
        <div class="menu-group">
            <div class="menu-item-parent" onclick="App.handleMenuClick(this, 'stats')">
                <span>📊 核心指标</span>
                <i class="arrow-icon">▶</i>
            </div>
            <div class="sub-menu">
                <div class="sub-item" onclick="App.switchModule('stats', 'overview')">● 数据概览</div>
            </div>
        </div>

        <div class="menu-group">
            <div class="menu-item-parent" onclick="App.handleMenuClick(this, 'plan')">
                <span>📋 生产计划</span>
                <i class="arrow-icon">▶</i>
            </div>
            <div class="sub-menu">
                <div class="sub-item" onclick="App.switchModule('plan', 'dailyReport')">● 生产日报</div>
                <div class="sub-item" onclick="App.switchModule('plan', 'scheduling')">● 排产计划</div>
            </div>
        </div>

        <div class="menu-group" id="menuPersonnelGroup" style="display:none;">
            <div class="menu-item-parent" onclick="App.handleMenuClick(this, 'personnel')">
                <span>👤 人员管理</span>
                <i class="arrow-icon">▶</i>
            </div>
            <div class="sub-menu">
                <div class="sub-item" onclick="App.switchModule('personnel', 'list')">● 账号权限</div>
            </div>
        </div>
        
        <div style="margin-top: auto;" class="menu-item" onclick="App.logout()">🚪 退出登录</div>
    </div>

    <div class="main-content" id="mainView">
        <section id="statsSection" class="content-section" style="display:none;"></section>
        <section id="planSection" class="content-section" style="display:none;"></section>
        <section id="personnelSection" class="content-section" style="display:none;"></section>
    </div>

    <div id="toastMessage" class="toast">该功能正在开发，请稍等。</div>

    <script src="js/modules/dailyReport.js"></script>
    <script src="js/modules/personnel.js"></script>
    <script src="js/modules/stats.js"></script>
    <script src="js/modules/plan.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
