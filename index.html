<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 生产管理中心</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div class="bg-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            
            <div class="login-brand">
                <div class="brand-logo">🏭</div>
                <h1>生产管理中心</h1>
                <p>Digital Production Hub</p>
            </div>

            <div class="login-form">
                <h2>欢迎回来</h2>
                <p class="subtitle">请在下方输入您的凭证以访问系统</p>

                <div class="input-group">
                    <label for="username">工号 / 用户名</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input type="text" id="username" placeholder="请输入您的工号" required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" placeholder="请输入您的密码" required autocomplete="current-password">
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> 记住我
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>

                <button type="button" class="login-btn" onclick="App.login()">
                    <span>安全登录</span>
                    <span class="btn-arrow">→</span>
                </button>
                
                <p class="footer-tips">只有管理员账号能创建新账号，若需协助请联系管理员。</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
