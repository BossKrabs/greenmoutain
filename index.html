<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>生产管理中心</title>
    <style>
        /* --- 1. 基础布局 CSS --- */
        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; align-items: center;
            background: url('baosheng.jpg') no-repeat;
            background-size: cover;
            background-position: 20% top; 
            background-attachment: fixed;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .right-mask {
            position: fixed; right: 0; top: 0;
            width: 25vw; height: 100vh;
            background-color: rgba(60, 60, 60, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            color: white; z-index: 100;
            box-shadow: -10px 0 30px rgba(0,0,0,0.2);
        }

        /* --- 2. 登录框 CSS --- */
        .login-container { width: 80%; max-width: 320px; }
        .login-container h2 { font-size: 28px; margin: 0 0 10px 0; }
        .login-container p { font-size: 14px; color: rgba(255, 255, 255, 0.7); margin-bottom: 40px; }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 8px; color: rgba(255, 255, 255, 0.8); text-transform: uppercase; }
        
        .input-group input {
            width: 100%; padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px; background: rgba(255, 255, 255, 0.1);
            color: white; outline: none; transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .login-btn {
            width: 100%; padding: 14px; background: white; color: #333;
            border: none; border-radius: 10px; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 15px;
        }

        .login-btn:hover { background: #f0f0f0; transform: translateY(-2px); }

        /* --- 3. 漂亮弹窗 CSS (之前贴错位置的部分) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s ease;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: white; padding: 40px; border-radius: 20px;
            text-align: center; transform: scale(0.7);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 320px;
        }

        .modal-overlay.active .modal-content { transform: scale(1); }

        .success-icon {
            width: 60px; height: 60px; background: #4CD964; color: white;
            border-radius: 50%; line-height: 60px; font-size: 30px; margin: 0 auto 20px;
        }

        .modal-content h3 { color: #333; margin: 0 0 10px 0; }
        .modal-content p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .modal-btn { background: #333; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            body { background-position: center top; }
            .right-mask { width: 100vw !important; }
        }

        /* 震动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .shake-error {
            animation: shake 0.3s ease-in-out;
            border-color: #FF3B30 !important; /* 变红 */
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.4) !important;
        }
    </style>
</head>
<body>

    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h3>登录成功</h3>
            <p>欢迎进入生产管理中心系统</p>
            <button id="closeBtn" class="modal-btn">开启工作台</button>
        </div>
    </div>

    <div class="right-mask">
        <div class="login-container">
            <h2>欢迎回来</h2>
            <p>生产管理中心 - 数字化控制台</p>
            <form id="loginForm">
                <div class="input-group">
                    <label>工号 / 用户名</label>
                    <input type="text" id="username" placeholder="请输入您的账号" required>
                </div>
                <div class="input-group" style="position: relative;">
                    <label>登录密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                    <span id="togglePassword" style="position: absolute; right: 10px; top: 35px; cursor: pointer; color: rgba(255,255,255,0.5); font-size: 12px;">显示</span>
                 </div>
                <div style="margin-bottom: 20px; display: flex; align-items: center; font-size: 12px; color: rgba(255,255,255,0.6);">
                    <input type="checkbox" id="rememberMe" style="margin-right: 8px; cursor: pointer;">
                    <label for="rememberMe" style="cursor: pointer;">记住登录状态</label>
                </div>
                <button type="button" id="loginBtn" class="login-btn">验证并登录</button>
            </form>
        </div>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const modal = document.getElementById('successModal');

        // 1. 密码明文/密文切换功能
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.innerText = type === 'password' ? '显示' : '隐藏';
        });

        // 2. 登录验证逻辑
        loginBtn.addEventListener('click', function() {
            const user = usernameInput.value.trim();
            const pass = passwordInput.value.trim();

        // 预设的正确账号密码（模拟数据库数据）
            const correctUser = "admin";
            const correctPass = "123456";

            if (user === correctUser && pass === correctPass) {
            // 验证成功：显示漂亮弹窗
                modal.classList.add('active');
            } else {
            // 验证失败：触发震动效果
                const container = document.querySelector('.login-container');
                container.classList.add('shake-error');
        
            // 提示用户（可选）
                setTimeout(() => {
                    container.classList.remove('shake-error');
                    alert('账号或密码不正确，请重试');
                }, 500);
            }
        });

        // 3. 按回车键也能触发登录
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>
